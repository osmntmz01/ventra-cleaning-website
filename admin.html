<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — Ventra Cleaning</title>
<style>
:root {
  --bg: #faf7f2;
  --ink: #0f0f0f;
  --ink2: #3d4542;
  --ink3: #8a8680;
  --paper: #ffffff;
  --accent: #ff5722;
  --teal: #0d8a7f;
  --teal-light: #e0f5f2;
  --green: #10b981;
  --red: #ef4444;
  --yellow: #f59e0b;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.5;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 40px 20px;
}

.header {
  text-align: center;
  margin-bottom: 40px;
}

.logo {
  font-family: 'Fraunces', serif;
  font-size: 2.5rem;
  font-weight: 900;
  letter-spacing: -0.04em;
  color: var(--ink);
  margin-bottom: 10px;
}

.logo span { color: var(--accent); }

/* Login Form */
.login-card {
  background: var(--paper);
  border-radius: 20px;
  padding: 40px;
  max-width: 400px;
  margin: 80px auto;
  box-shadow: 0 20px 40px -15px rgba(15,15,15,0.1);
}

.login-card h2 {
  font-family: 'Fraunces', serif;
  font-size: 1.5rem;
  margin-bottom: 24px;
  text-align: center;
}

.field {
  margin-bottom: 20px;
}

.field label {
  display: block;
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--ink2);
  margin-bottom: 8px;
}

.field input {
  width: 100%;
  padding: 14px 16px;
  border: 2px solid rgba(15,15,15,0.1);
  border-radius: 12px;
  font-family: inherit;
  font-size: 0.95rem;
  transition: border-color 0.3s;
}

.field input:focus {
  outline: none;
  border-color: var(--teal);
}

.btn-primary {
  width: 100%;
  background: var(--ink);
  color: white;
  border: none;
  padding: 16px;
  border-radius: 12px;
  font-family: inherit;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
}

.btn-primary:hover {
  background: var(--accent);
  transform: translateY(-2px);
}

.error {
  color: var(--red);
  font-size: 0.85rem;
  margin-top: 10px;
  text-align: center;
}

/* Admin Dashboard */
.admin-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 40px;
  padding-bottom: 20px;
  border-bottom: 2px solid rgba(15,15,15,0.1);
}

.admin-title {
  font-family: 'Fraunces', serif;
  font-size: 2rem;
  font-weight: 900;
  color: var(--ink);
}

.logout-btn {
  background: none;
  border: 2px solid var(--ink3);
  color: var(--ink3);
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.3s;
}

.logout-btn:hover {
  border-color: var(--red);
  color: var(--red);
}

/* Filters */
.filters {
  display: flex;
  gap: 10px;
  margin-bottom: 30px;
  flex-wrap: wrap;
}

.filter-btn {
  background: var(--paper);
  border: 2px solid rgba(15,15,15,0.1);
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.3s;
}

.filter-btn.active {
  background: var(--teal);
  color: white;
  border-color: var(--teal);
}

.filter-btn:hover:not(.active) {
  border-color: var(--teal);
}

/* Stats */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-bottom: 40px;
}

.stat-card {
  background: var(--paper);
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 10px 20px -10px rgba(15,15,15,0.1);
}

.stat-number {
  font-family: 'Fraunces', serif;
  font-size: 2.5rem;
  font-weight: 900;
  margin-bottom: 5px;
}

.stat-label {
  font-size: 0.9rem;
  color: var(--ink3);
}

.stat-card.pending .stat-number { color: var(--yellow); }
.stat-card.confirmed .stat-number { color: var(--green); }
.stat-card.rejected .stat-number { color: var(--red); }

/* Bookings Table */
.bookings-container {
  background: var(--paper);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 20px 40px -15px rgba(15,15,15,0.1);
}

.bookings-table {
  width: 100%;
  border-collapse: collapse;
}

.bookings-table th {
  background: var(--teal);
  color: white;
  padding: 16px 12px;
  text-align: left;
  font-weight: 600;
  font-size: 0.9rem;
}

.bookings-table td {
  padding: 16px 12px;
  border-bottom: 1px solid rgba(15,15,15,0.05);
  font-size: 0.9rem;
}

.bookings-table tr:hover {
  background: rgba(13,138,127,0.03);
}

.status-badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.status-badge.pending {
  background: rgba(245,158,11,0.15);
  color: var(--yellow);
}

.status-badge.confirmed {
  background: rgba(16,185,129,0.15);
  color: var(--green);
}

.status-badge.rejected {
  background: rgba(239,68,68,0.15);
  color: var(--red);
}

.action-btns {
  display: flex;
  gap: 8px;
}

.btn-sm {
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: all 0.3s;
}

.btn-confirm {
  background: var(--green);
  color: white;
}

.btn-confirm:hover {
  background: #059669;
}

.btn-reject {
  background: var(--red);
  color: white;
}

.btn-reject:hover {
  background: #dc2626;
}

.btn-sm:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.no-bookings {
  text-align: center;
  padding: 60px 20px;
  color: var(--ink3);
  font-style: italic;
}

/* Booking Details */
.booking-details {
  max-width: 300px;
}

.detail-row {
  margin-bottom: 8px;
  font-size: 0.85rem;
}

.detail-label {
  font-weight: 600;
  color: var(--ink2);
}

/* Price Management */
.price-input {
  flex: 1;
  padding: 8px 12px;
  border: 2px solid rgba(15,15,15,0.1);
  border-radius: 6px;
  font-size: 1rem;
  font-weight: 600;
  text-align: center;
  transition: border-color 0.3s;
}

.price-input:focus {
  outline: none;
  border-color: var(--teal);
}

.price-item {
  background: var(--bg);
  padding: 16px;
  border-radius: 10px;
  border: 1px solid rgba(15,15,15,0.05);
}

@media (max-width: 768px) {
  .container { padding: 20px 10px; }
  .admin-header { flex-direction: column; gap: 20px; align-items: flex-start; }
  .stats { grid-template-columns: 1fr 1fr; }
  .bookings-table { font-size: 0.8rem; }
  .bookings-table th, .bookings-table td { padding: 12px 8px; }
  .action-btns { flex-direction: column; }
}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen">
  <div class="login-card">
    <div class="header">
      <div class="logo">Ventra<span>.</span></div>
    </div>
    <h2>Admin Login</h2>
    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password">
    </div>
    <button class="btn-primary" onclick="login()">Login</button>
    <div id="loginError" class="error" style="display: none;"></div>
  </div>
</div>

<!-- Admin Dashboard -->
<div id="adminDashboard" style="display: none;">
  <div class="container">
    <div class="admin-header">
      <h1 class="admin-title">Booking Management</h1>
      <div style="display: flex; gap: 10px;">
        <button class="logout-btn" onclick="loadBookings()" style="background: var(--green); color: white; border-color: var(--green);">Refresh</button>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats" id="statsContainer">
      <div class="stat-card">
        <div class="stat-number" id="totalBookings">0</div>
        <div class="stat-label">Total Bookings</div>
      </div>
      <div class="stat-card pending">
        <div class="stat-number" id="pendingCount">0</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat-card confirmed">
        <div class="stat-number" id="confirmedCount">0</div>
        <div class="stat-label">Confirmed</div>
      </div>
      <div class="stat-card rejected">
        <div class="stat-number" id="rejectedCount">0</div>
        <div class="stat-label">Rejected</div>
      </div>
    </div>

    <!-- Price Management -->
    <div class="bookings-container" style="margin-bottom: 40px;">
      <div style="padding: 20px; border-bottom: 2px solid var(--teal);">
        <h3 style="margin: 0; color: var(--teal); font-size: 1.2rem;">💰 Price Management</h3>
      </div>
      <div style="padding: 20px;">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
          <div class="price-item">
            <label style="display: block; font-weight: 600; margin-bottom: 5px;">🌿 Ozone Treatment</label>
            <div style="display: flex; align-items: center; gap: 10px;">
              <span style="font-size: 1.5rem;">$</span>
              <input type="number" id="price-ozone" class="price-input" min="0" step="1">
              <button class="btn-sm" style="background: var(--teal); color: white;" onclick="updatePrice('Ozone Treatment', 'price-ozone')">Update</button>
            </div>
          </div>
          <div class="price-item">
            <label style="display: block; font-weight: 600; margin-bottom: 5px;">🪑 Seat Cleaning</label>
            <div style="display: flex; align-items: center; gap: 10px;">
              <span style="font-size: 1.5rem;">$</span>
              <input type="number" id="price-seat" class="price-input" min="0" step="1">
              <button class="btn-sm" style="background: var(--teal); color: white;" onclick="updatePrice('Seat Cleaning', 'price-seat')">Update</button>
            </div>
          </div>
          <div class="price-item">
            <label style="display: block; font-weight: 600; margin-bottom: 5px;">🚗 Seat + Floor</label>
            <div style="display: flex; align-items: center; gap: 10px;">
              <span style="font-size: 1.5rem;">$</span>
              <input type="number" id="price-seatfloor" class="price-input" min="0" step="1">
              <button class="btn-sm" style="background: var(--teal); color: white;" onclick="updatePrice('Seat + Floor', 'price-seatfloor')">Update</button>
            </div>
          </div>
          <div class="price-item">
            <label style="display: block; font-weight: 600; margin-bottom: 5px;">🎯 Spot Cleaning</label>
            <div style="display: flex; align-items: center; gap: 10px;">
              <span style="font-size: 1.5rem;">$</span>
              <input type="number" id="price-spot" class="price-input" min="0" step="1">
              <button class="btn-sm" style="background: var(--teal); color: white;" onclick="updatePrice('Spot Cleaning', 'price-spot')">Update</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <button class="filter-btn active" onclick="filterBookings('all')">All</button>
      <button class="filter-btn" onclick="filterBookings('pending')">Pending</button>
      <button class="filter-btn" onclick="filterBookings('confirmed')">Confirmed</button>
      <button class="filter-btn" onclick="filterBookings('rejected')">Rejected</button>
    </div>

    <!-- Bookings Table -->
    <div class="bookings-container">
      <table class="bookings-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Customer</th>
            <th>Service</th>
            <th>Details</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="bookingsTableBody">
        </tbody>
      </table>
      <div id="noBookings" class="no-bookings" style="display: none;">
        No bookings found.
      </div>
    </div>
  </div>
</div>

<script>
let allBookings = [];
let currentFilter = 'all';

// Login functionality
function login() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;

  if (username === 'admin' && password === 'ventra2026') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminDashboard').style.display = 'block';
    loadBookings();
  } else {
    const errorDiv = document.getElementById('loginError');
    errorDiv.textContent = 'Invalid username or password';
    errorDiv.style.display = 'block';
  }
}

function logout() {
  document.getElementById('adminDashboard').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'block';
  document.getElementById('username').value = '';
  document.getElementById('password').value = '';
  document.getElementById('loginError').style.display = 'none';
}

// Load bookings from localStorage
function loadBookings() {
  try {
    const bookingsData = localStorage.getItem('ventra_bookings');
    allBookings = bookingsData ? JSON.parse(bookingsData) : [];
    updateStats();
    renderBookings();
    loadPrices();
  } catch (error) {
    console.error('Error loading bookings from localStorage:', error);
    allBookings = [];
  }
}

// Load and display current prices
function loadPrices() {
  const defaultPrices = {
    'Ozone Treatment': 100,
    'Seat Cleaning': 100,
    'Seat + Floor': 180,
    'Spot Cleaning': 70
  };

  const prices = JSON.parse(localStorage.getItem('service_prices') || JSON.stringify(defaultPrices));

  document.getElementById('price-ozone').value = prices['Ozone Treatment'] || 100;
  document.getElementById('price-seat').value = prices['Seat Cleaning'] || 100;
  document.getElementById('price-seatfloor').value = prices['Seat + Floor'] || 180;
  document.getElementById('price-spot').value = prices['Spot Cleaning'] || 70;
}

// Update service price
function updatePrice(serviceName, inputId) {
  const newPrice = parseInt(document.getElementById(inputId).value);

  if (!newPrice || newPrice < 0) {
    alert('Please enter a valid price');
    return;
  }

  const prices = JSON.parse(localStorage.getItem('service_prices') || '{}');
  prices[serviceName] = newPrice;
  localStorage.setItem('service_prices', JSON.stringify(prices));

  alert(`${serviceName} price updated to $${newPrice}`);
}

// Update stats
function updateStats() {
  const total = allBookings.length;
  const pending = allBookings.filter(b => b.status === 'pending').length;
  const confirmed = allBookings.filter(b => b.status === 'confirmed').length;
  const rejected = allBookings.filter(b => b.status === 'rejected').length;

  document.getElementById('totalBookings').textContent = total;
  document.getElementById('pendingCount').textContent = pending;
  document.getElementById('confirmedCount').textContent = confirmed;
  document.getElementById('rejectedCount').textContent = rejected;
}

// Filter bookings
function filterBookings(status) {
  currentFilter = status;

  // Update filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.remove('active');
  });
  event.target.classList.add('active');

  renderBookings();
}

// Render bookings table
function renderBookings() {
  const tbody = document.getElementById('bookingsTableBody');
  const noBookingsDiv = document.getElementById('noBookings');

  let filteredBookings = allBookings;
  if (currentFilter !== 'all') {
    filteredBookings = allBookings.filter(b => b.status === currentFilter);
  }

  // Sort by timestamp (newest first)
  filteredBookings.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

  if (filteredBookings.length === 0) {
    tbody.innerHTML = '';
    noBookingsDiv.style.display = 'block';
    return;
  }

  noBookingsDiv.style.display = 'none';

  tbody.innerHTML = filteredBookings.map(booking => `
    <tr>
      <td>
        <div><strong>${formatDate(booking.date)}</strong></div>
        <div style="font-size: 0.8rem; color: var(--ink3);">${booking.time}</div>
      </td>
      <td>
        <div><strong>${booking.name}</strong></div>
        <div style="font-size: 0.8rem; color: var(--ink3);">${booking.phone}</div>
        <div style="font-size: 0.8rem; color: var(--ink3);">${booking.email}</div>
      </td>
      <td>
        <div><strong>${booking.services ? booking.services.map(s => s.name).join(' + ') : booking.service || 'Unknown'}</strong></div>
        <div style="font-size: 0.8rem; color: var(--ink3);">$${booking.totalPrice || booking.price || 0} AUD</div>
        ${booking.totalTime ? `<div style="font-size: 0.7rem; color: var(--ink3);">${booking.totalTime} hour${booking.totalTime > 1 ? 's' : ''}</div>` : ''}
      </td>
      <td class="booking-details">
        ${booking.services ?
          `<div class="detail-row">
            <span class="detail-label">Services:</span><br>
            ${booking.services.map(s => `• ${s.name} ($${s.price})`).join('<br>')}
          </div>` : ''
        }
        <div class="detail-row">
          <span class="detail-label">Location:</span> ${booking.address || 'Drop-off'}
        </div>
        <div class="detail-row">
          <span class="detail-label">Issue:</span> ${booking.issue}
        </div>
        ${booking.travelSurcharge > 0 ?
          `<div class="detail-row">
            <span class="detail-label">Travel:</span> +$${booking.travelSurcharge}
          </div>` : ''
        }
        <div class="detail-row" style="font-size: 0.8rem; color: var(--ink3);">
          Booked: ${formatDateTime(booking.timestamp)}
        </div>
      </td>
      <td>
        <span class="status-badge ${booking.status}">${booking.status}</span>
      </td>
      <td>
        <div class="action-btns">
          <button class="btn-sm btn-confirm"
                  onclick="updateBookingStatus('${booking.id}', 'confirmed')">
            Confirm
          </button>
          <button class="btn-sm btn-reject"
                  onclick="updateBookingStatus('${booking.id}', 'rejected')">
            Reject
          </button>
          <button class="btn-sm" style="background: var(--ink3); color: white;"
                  onclick="updateBookingStatus('${booking.id}', 'pending')">
            Reset
          </button>
        </div>
      </td>
    </tr>
  `).join('');
}

// Update booking status
function updateBookingStatus(id, status) {
  try {
    // Update in memory (convert both IDs to string for comparison)
    const booking = allBookings.find(b => String(b.id) === String(id));

    if (booking) {
      booking.status = status;
      booking.updatedAt = new Date().toISOString();

      // Save to localStorage
      localStorage.setItem('ventra_bookings', JSON.stringify(allBookings));

      // Update UI
      updateStats();
      renderBookings();
    } else {
      alert('Booking not found');
    }
  } catch (error) {
    console.error('Error updating booking:', error);
    alert('Error updating booking status');
  }
}

// Helper functions
function formatDate(dateStr) {
  return new Date(dateStr).toLocaleDateString('en-AU', {
    weekday: 'short',
    year: 'numeric',
    month: 'short',
    day: 'numeric'
  });
}

function formatDateTime(dateStr) {
  return new Date(dateStr).toLocaleString('en-AU', {
    year: 'numeric',
    month: 'short',
    day: 'numeric',
    hour: '2-digit',
    minute: '2-digit'
  });
}

// Enter key support for login
document.getElementById('username').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') login();
});

document.getElementById('password').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') login();
});
</script>

</body>
</html>
